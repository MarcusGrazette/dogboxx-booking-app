name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: dogboxx
          POSTGRES_PASSWORD: dogboxx
          POSTGRES_DB: dogboxx_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      FLASK_ENV: testing
      SECRET_KEY: ci-secret-key-not-for-production
      # Used by flask db upgrade / flask db check (runs migrations against Postgres)
      DATABASE_URL: postgresql://dogboxx:dogboxx@localhost:5432/dogboxx_test
      # Used by pytest TestingConfig (runs tests against Postgres)
      TEST_DATABASE_URL: postgresql://dogboxx:dogboxx@localhost:5432/dogboxx_test

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Verify migration chain
        run: flask db upgrade
        # Runs every migration from scratch on a clean Postgres DB.
        # Catches: missing migrations, broken upgrade functions, wrong column types.

      - name: Check model/migration sync
        run: flask db check
        # Fails if any SQLAlchemy model column is not reflected in the migration chain.
        # Catches: columns added to models without a matching migration.

      - name: Reset DB for test isolation
        run: |
          python - <<'EOF'
          import os
          os.environ['FLASK_ENV'] = 'testing'
          from app import create_app, db
          app = create_app('testing')
          with app.app_context():
              db.drop_all()
          EOF

      - name: Run tests
        run: pytest --tb=short -q

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Install production dependencies
        run: pip install -r requirements.txt

      - name: Audit dependencies for known CVEs (non-blocking)
        # Informational for now: continue-on-error keeps a finding from failing the
        # workflow while the current backlog is triaged. Remove it (and mark this job a
        # required check) once the flagged CVEs are resolved. Installs prod requirements
        # and audits the installed env, so the full prod transitive tree is covered.
        continue-on-error: true
        run: |
          pip install pip-audit
          pip-audit --progress-spinner=off
