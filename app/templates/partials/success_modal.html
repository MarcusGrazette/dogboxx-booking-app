{# Shared success pop-over — stacked confirm modal. See docs/UX_GUIDE.md §1.
   Include this once per page, then drive it from JS with:
     showConfirmed(summary, srcModal, srcEl, onClose?)
   (provided by static/js/success-modal.js). #}
<div class="modal fade" id="successModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content border-0 shadow text-center">
            <div class="modal-body py-4 px-4">
                <i class="bi bi-check-circle-fill text-success d-block mb-3" style="font-size:3.5rem; line-height:1;"></i>
                <h5 class="fw-bold mb-2">Success</h5>
                <p class="text-muted small mb-3" id="success-summary"></p>
                <button type="button" class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">Done</button>
            </div>
        </div>
    </div>
</div>
