<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1, width=device-width">
    <title>500 — Something went wrong</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <style>
        body {
            background-color: #f6f3f2;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .error-code {
            font-size: 6rem;
            font-weight: 800;
            line-height: 1;
            color: #f0e0ec;
            letter-spacing: -0.03em;
            user-select: none;
        }
        .btn-primary {
            background-color: #E02FAC;
            border-color: #E02FAC;
            font-weight: 700;
            padding: 0.5rem 1.5rem;
        }
        .btn-primary:hover {
            background-color: #C0258F;
            border-color: #C0258F;
        }
    </style>
</head>
<body>
<div class="text-center px-3" style="max-width: 420px; width: 100%;">

    <div class="error-code">500</div>

    <div style="margin-top: -0.75rem;">
        <i class="bi bi-wrench-adjustable" style="font-size: 2.5rem; color: #E02FAC;"></i>
    </div>

    <h2 class="mt-3 mb-2 fw-bold" style="font-size: 1.35rem; color: #1B1B1B;">
        Something went wrong.
    </h2>
    <p class="text-muted mb-4" style="font-size: 0.9rem; line-height: 1.6;">
        An unexpected error occurred on our end. Please try again in a moment —
        if the problem persists, contact support.
    </p>

    <a href="/" class="btn btn-primary">Take me home</a>

</div>
</body>
</html>
