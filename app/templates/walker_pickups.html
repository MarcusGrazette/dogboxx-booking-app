{% extends "layout.html" %}
{% from "partials/calendar_component.html" import calendar_widget %}

{% block title %}Pickup List{% endblock %}

{% block main %}
<div class="container" style="max-width: 700px;">
    <div class="page-header">
        <h2><i class="bi bi-geo-alt me-2"></i>Pickup List</h2>
    </div>

    <!-- Date summary bar (shown when calendar is collapsed) -->
    <div id="date-summary" class="mb-3 d-none">
        <div class="date-summary-bar">
            <div class="d-flex align-items-center">
                <i class="bi bi-calendar3 me-2" style="opacity:0.6;"></i>
                <span id="date-summary-text" class="date-label"></span>
                <span id="date-today-badge" class="date-today-badge d-none">Today</span>
            </div>
            <button class="btn-change-date" id="change-date-btn">
                <i class="bi bi-pencil-square me-1"></i>Change
            </button>
        </div>
    </div>

    <!-- Calendar section (collapsible) -->
    <div id="calendar-section" class="mb-3">
        {{ calendar_widget('pickup-cal') }}
    </div>

    <!-- Pickup list -->
    <div id="pickup-list-container">
        {% include "partials/pickup_list.html" %}
    </div>
</div>

<script src="{{ url_for('static', filename='js/reusable-calendar.js') }}"></script>
<script>
(function () {
    const todayStr = '{{ today.strftime("%Y-%m-%d") }}';
    const initialDate = '{{ selected_date.strftime("%Y-%m-%d") }}';
    const calSection = document.getElementById('calendar-section');
    const dateSummary = document.getElementById('date-summary');
    const dateSummaryText = document.getElementById('date-summary-text');
    const todayBadge = document.getElementById('date-today-badge');
    const changeDateBtn = document.getElementById('change-date-btn');
    const pickupContainer = document.getElementById('pickup-list-container');

    const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    const DAYS_SHORT = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

    function formatDateDisplay(dateStr) {
        const [y, m, d] = dateStr.split('-').map(Number);
        const dow = new Date(y, m - 1, d).getDay(); // 0=Sun
        const dowIdx = (dow + 6) % 7; // Mon=0..Sun=6
        return `${DAYS_SHORT[dowIdx]}, ${d} ${MONTHS[m - 1]} ${y}`;
    }

    function collapseCalendar(dateStr) {
        dateSummaryText.textContent = formatDateDisplay(dateStr);
        if (dateStr === todayStr) {
            todayBadge.classList.remove('d-none');
        } else {
            todayBadge.classList.add('d-none');
        }
        calSection.style.maxHeight = calSection.scrollHeight + 'px';
        requestAnimationFrame(() => {
            calSection.style.transition = 'max-height 0.3s ease, opacity 0.3s ease';
            calSection.style.maxHeight = '0';
            calSection.style.overflow = 'hidden';
            calSection.style.opacity = '0';
        });
        dateSummary.classList.remove('d-none');
    }

    function expandCalendar() {
        calSection.style.transition = 'max-height 0.3s ease, opacity 0.3s ease';
        calSection.style.maxHeight = '500px';
        calSection.style.overflow = '';
        calSection.style.opacity = '1';
        dateSummary.classList.add('d-none');
    }

    function loadPickups(dateStr) {
        pickupContainer.style.opacity = '0.4';
        fetch(`/walker/api/pickup-list/${dateStr}`)
            .then(r => r.text())
            .then(html => {
                pickupContainer.innerHTML = html;
                pickupContainer.style.opacity = '1';
            })
            .catch(() => {
                pickupContainer.innerHTML = '<div class="alert alert-danger">Failed to load pickups. Please try again.</div>';
                pickupContainer.style.opacity = '1';
            });
    }

    changeDateBtn.addEventListener('click', expandCalendar);

    const cal = createCalendar('pickup-cal', {
        onMonthChange(year, month) {
            fetch(`/walker/api/pickup-days/${year}/${month}`)
                .then(r => r.json())
                .then(dates => cal.setHighlightedDates(dates))
                .catch(() => cal.hideLoading());
        },
        onDateClick(year, month, day, dateStr) {
            collapseCalendar(dateStr);
            loadPickups(dateStr);
        }
    });

    // Auto-select today (or the initial date) and collapse
    cal.selectDate(initialDate);
    collapseCalendar(initialDate);
})();
</script>
{% endblock %}
